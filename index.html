<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Section -->
    <div class="left-panel">
        <img src="https://static.vecteezy.com/system/resources/previews/026/721/204/non_2x/washing-machine-and-laundry-laundry-sticker-png.png" alt="Laundry Illustration">
    </div>

    <!-- Right Section -->
    <div class="right-panel">

        <div class="login-box">

            <h1 align="center">Welcome back!</h1>
            <p align="center">Please enter your credentials to login!</p>

            <form>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Email@ID.com">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Password">
                </div>

                <div class="forgot">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

            </form>

            <div class="register">
                Not a member?
                <a href="#">Register Now</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
